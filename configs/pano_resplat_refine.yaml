Training:
  stage: refine
  steps: 2000
  batch_size: 1
  frames_per_sample: 4
  context_views: 3
  target_views: 1
  train_min_refine: 1
  train_max_refine: 4
  window_mode: random
  num_workers: 2
  output_dir: outputs/pano_resplat/refine_small
  save_every: 500
  eval_every: 250
  vis_every: 250
Model:
  use_synthetic_features: false
  panovggt_repo: /mnt/disk1/lanboyang/Project/PanoVGGT
  panovggt_config: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  panovggt_checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  feature_hook: aggregator
  feature_dim: 2048
  image_size: [518, 1036]
  skip_dinov2_pretrain: true
Initializer:
  latent_downsample: 2
  gaussians_per_cell: 2
  state_dim: 128
  max_gaussians: 8192
  use_world_points_as_base: true
Feedback:
  feedback_dim: 64
  hidden_dim: 128
Refiner:
  hidden_dim: 128
  knn: 8
  num_heads: 4
  max_knn_points: 2048
Dataset:
  synthetic: false
  root: /mnt/disk1/lanboyang/Datasets/Airsim360/Omni360-Scene
  pose_root: /mnt/disk1/lanboyang/Datasets/Airsim360/UE_Raw_sample_pts
  scenes: ["DTW", "NYC"]
  erp_resize_height: 518
  erp_resize_width: 1036
  depth_format: euclidean_range
  pose_coordinate_system: ue_airsim
  pose_translation_scale: 0.01
  validation_fraction: 0.05
Renderer:
  backend: gsplat360
  allow_soft_splat_fallback: false
WeightsAndBiases:
  enabled: true
  mode: online
  project: 360Droid-splat
Validation:
  enabled: true
  max_batches: 2
