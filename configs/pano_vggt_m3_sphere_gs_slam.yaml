Dataset:
  synthetic: false
  dataset_path: /mnt/disk1/lanboyang/Datasets/360uav/seqs
  sequence: null
  # Resize PanoCity-scale ERP input before inference; PanoVGGT.image_size stays
  # null so model feature/image sizes are still inferred from tensors.
  erp_resize_height: 518
  erp_resize_width: 1036
  begin: 0
  end: null

Frontend:
  mode: panovggt_long
  checkpoint: null
  keyframe_threshold: 0.5
  force_keyframe_interval: 8

PanoVGGT:
  engine: external
  repo_path: /mnt/disk1/lanboyang/Project/PanoVGGT
  config_path: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  strict_checkpoint: false
  skip_dinov2_pretrain: true
  image_size: null
  patch_multiple: 14
  chunk_size: 4
  overlap: 2
  emit_delay: 1
  align_mode: sim3
  require_aligned_world_points: true
  emit_unaligned: false
  min_overlap_points: 2048
  max_align_rmse: 0.35
  min_inlier_ratio: 0.35
  max_scale_jump: 2.0
  loop_enable: false
  max_alignment_points: 4096
  max_alignment_cache_frames: 128
  amp: true
  input_batch_dim: true

  M3Sphere:
    enabled: true
    descriptor_dim: 24

  KeyframeAnchor:
    enabled: true
    prepend_previous_keyframe: false
    pair_confidence_mode: geometric_mean
    cell_pair_conf_threshold: 0.45
    frame_mean_pair_conf_threshold: 0.38
    frame_low_pair_conf_ratio: 0.75
    match_coverage_threshold: 0.0
    translation_threshold: 2.0
    translation_depth_ratio_threshold: 0.30
    m3_score_threshold: 0.43
    min_keyframe_interval: 4
    max_keyframe_interval: 8
    sky_threshold: 0.5

  JointInference:
    enabled: true
    history_policy: recent
    min_history_frames: 0
    max_history_frames: 3

  Alignment:
    use_common_history: false
    history_point_budget_ratio: 0.0

  MatchingHead:
    enabled: true
    checkpoint: null
    matching_checkpoint: /mnt/disk1/lanboyang/Project/360Droid-splat/outputs/panovggt_m3_sphere_omni360_matching_ddp_b2_20k_8f_parallaxfix_dtw_nyc_20260604_1036/checkpoints/matching_head.pt
    sky_checkpoint: /mnt/disk1/lanboyang/Project/360Droid-splat/outputs/panovggt_m3_sphere_omni360_sky_ddp_b4_10k_dtw_nyc_20260604_0845/checkpoints/sky_head.pt
    descriptor_dim: 24
    feature_hook: null
    feature_key: null
    strict: true
    allow_fake_matching: false
    # Matching output Hf,Wf follows the input feature tensor Hf,Wf.
    # Do not configure or assume a fixed descriptor output_hw.

  DenseMatching:
    enabled: true
    search_radius: 4
    topk: 1
    min_match_confidence: 0.2
    min_static_confidence: 0.2
    min_match_score: 0.2
    max_factors: 8192
    max_samples_per_edge: 1024
    use_wraparound: true
    forward_backward: true
    fb_tolerance: 0.5
    use_depth_consistency: true
    depth_consistency_rel: 0.08
    depth_consistency_abs: 0.20

  DenseBA:
    enabled: true
    shadow_mode: false
    mode: history_window
    solver_mode: pose_only_factor_graph
    residual_mode: tangent
    debug_pixel_residual: false
    iters: 3
    lm: 0.0001
    fixed_policy: first_frame
    fixed_frames: 1
    sample_stride: 1
    min_valid_factor_ratio: 0.03
    min_num_factors: 256
    huber_delta_deg: 0.5
    pose_prior_weight: 0.001
    depth_prior_weight: 0.01
    max_pose_update_deg: 5.0
    max_logdepth_update: 0.35
    fallback_if_residual_worse: true
    residual_worse_tolerance: 1.05
    factor_chunk_size: 2048
    max_ba_factors: 8192
    max_depth_variables: 0
    max_solver_sec: 8.0
    optimize_pose: true
    optimize_depth: false
    depth_update_policy: clamp_local
    logdepth_update_quantile: 0.99
    line_search: true

  InferenceWindow:
    size: 4
    overlap: 2
    temporal_radius: 2
    max_edges: 24

MapRepresentation:
  mode: anchor_scaffold_panorama

Training:
  panorama_render_mode: pfgs360_gsplat
  pfgs360_render_mode: RGB+ED
  pfgs360_rasterize_mode: antialiased
  pfgs360_packed: false
  pfgs360_radius_clip: 0.0
  pfgs360_near_plane: 0.01
  pfgs360_far_plane: 100000.0
  pfgs360_absgrad: true
  pfgs360_distloss: false

Hierarchical:
  voxel_size_lis: [0.06, 0.18, 0.6]

Mapping:
  seed_source: world_points_only
  max_seeds_per_keyframe: 0
  min_depth_confidence: 0.08
  sky_mask_enable: true
  sky_mask_top_ratio: 0.58
  sky_mask_min_blue: 0.35
  sky_mask_blue_margin: 0.05
  sky_mask_cloud_brightness: 0.72
  sky_mask_cloud_saturation: 0.22
  sky_mask_texture_threshold: 0.08
  lr: 0.002
  refine_steps_per_keyframe: 0
  NovelGaussianInsertion:
    enabled: true
    strategy: pfgs360
    voxel_size: 0.12
    first_keyframe_max_seeds: 160000
    keyframe_max_seeds: 30000
    global_anchor_budget: 3000000
    temporal_pair_conf_min: 0.70
    render_alpha_min: 0.20
    missing_alpha_min: 0.05
    render_depth_rel_threshold: 0.10
    max_missing_seeds_per_keyframe: 12000
    max_depth_mismatch_seeds_per_keyframe: 30000
    prioritize_depth_mismatch: true
    near_grid_radius: 1
    near_distance_factor: 1.0
    reset_after_outlier_observations: 3
    prune_after_outlier_observations: 6
    protect_recent_keyframes: 8
    max_prune_per_keyframe: 500
    save_visualization: true
    visualize_candidates: true

  BootstrapOptimization:
    enabled: true
    first_keyframe_steps: 300
    save_every: 25

BackendOptimization:
  enabled: true
  gaussian_refine_enable: true
  pose_refine_enable: true
  keyframe_steps: 0
  keyframe_optimize_pose: false
  non_keyframe_steps: 0
  local_submap_steps: 0
  sliding_window_steps: 200
  window_keyframes: 8
  random_window_frame_per_iter: true
  sample_keyframes_per_step: 1
  pose_window_keyframes: 8
  replay_random_keyframes: 0
  final_global_steps: 100
  use_frontend_graph_window: true
  fixed_window_frames: 1
  gaussian_lr: 0.002
  pose_lr: 0.001
  skybox_lr: 0.01
  optimize_skybox: true
  existing_gaussian_lr_scale: 0.15
  new_gaussian_lr_scale: 1.0
  early_stop:
    enabled: false
    min_delta: 0.0002
    patience: 20

BackendFeedback:
  enabled: true
  keyframes_only: true
  update_last_keyframe_anchor: true
  blend_alpha: 1.0
  reject_first_keyframe_pose_feedback: true
  min_optimization_steps: 1
  require_finite_loss: true
  min_rotation_det: 0.5
  max_rotation_det: 1.5
  log_decisions: true

SkyBox:
  enabled: true
  type: cubemap
  resolution: 512
  init_from_first_keyframe: true
  optimize: true
  optimization_mask_enable: true
  force_sky_render: true
  sky_alpha_loss_weight: 0.05
  init_fallback_to_full_image: false
  lr: 0.01
  sky_mask_top_ratio: 0.58
  sky_mask_min_blue: 0.35
  sky_mask_blue_margin: 0.05
  sky_mask_cloud_brightness: 0.72
  sky_mask_cloud_saturation: 0.22
  sky_mask_texture_threshold: 0.08

Renderer:
  allow_smoke_fallback: false
  extra_gsplat360_roots: []

WeightsAndBiases:
  enabled: true
  mode: online
  project: 360Droid-splat
  group: panovggt_m3_sphere
  run_name: panovggt_m3_sphere_gs_slam
  log_every: 5
  log_keyframes: true

Visualization:
  save_local: true
  log_every: 5
  m3_log_every: 5
  m3_max_matches: 80
  save_kf_opt: true
  kf_opt_log_every: 1
  kf_opt_max_width: 1920

Results:
  save_dir: outputs/pano_vggt_m3_sphere_gs_slam
  kf_render_format: png
  kf_jpeg_quality: 95
  save_final_ply: true
  save_final_checkpoint: true
  save_final_keyframe_renders: true
  final_keyframe_render_stride: 1
  final_keyframe_render_max: 50
  save_skybox_previews: true
  skybox_preview_height: 256
  skybox_preview_width: 512

RuntimeProfiling:
  enabled: true
  path: runtime_profile.jsonl
