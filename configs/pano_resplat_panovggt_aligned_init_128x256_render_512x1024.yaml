Training:
  stage: init
  steps: 50000
  batch_size: 1
  frames_per_sample: 4
  context_views: 4
  target_views: 4
  view_mode: input_reconstruction
  window_mode: fixed
  render_height: 512
  render_width: 1024
  train_min_refine: 0
  train_max_refine: 0
  eval_refine: 0
  num_workers: 2
  output_dir: outputs/pano_resplat/panovggt_aligned_init_128x256_render_512x1024
  save_every: 1000
  eval_every: 250
  vis_every: 250
  log_every: 10

Model:
  use_synthetic_features: false
  panovggt_repo: /mnt/disk1/lanboyang/Project/PanoVGGT
  panovggt_config: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  panovggt_checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  feature_hook: aggregator
  feature_dim: 2048
  image_size: [128, 256]
  patch_size: 14
  patch_multiple: 14
  amp: true
  input_batch_dim: true
  strict_checkpoint: false
  skip_dinov2_pretrain: true

Initializer:
  type: panovggt_aligned
  position_mode: panovggt_aligned
  latent_downsample: 1
  gaussians_per_cell: 1
  state_dim: 64
  sh_degree: 3
  max_gaussians: 0
  min_scale: 0.002
  max_scale: 0.08
  init_scale: 0.015
  use_world_points_as_base: true
  use_local_offsets: true
  max_offset_abs: 0.05
  max_offset_depth_ratio: 0.02

Feedback:
  feedback_dim: 64
  hidden_dim: 128

Refiner:
  hidden_dim: 128
  knn: 8
  num_heads: 4
  max_knn_points: 8192
  chunk_size: 4096

Dataset:
  synthetic: false
  root: /mnt/disk1/lanboyang/Datasets/Airsim360/Omni360-Scene
  pose_root: /mnt/disk1/lanboyang/Datasets/Airsim360/UE_Raw_sample_pts
  scenes: ["DTW", "NYC"]
  erp_resize_height: 128
  erp_resize_width: 256
  clip_stride: 1
  temporal_radius: 4
  depth_format: euclidean_range
  depth_scale: 1.0
  depth_invalid_value: 1000.0
  pose_coordinate_system: ue_airsim
  pose_translation_scale: 0.01
  validation_fraction: 0.05
  validation_split: tail
  class_map:
    sky_names: ["Sky", "sky"]
    sky_ids: [3]

Renderer:
  backend: gsplat360
  allow_soft_splat_fallback: false
  soft_max_points: 4096

Loss:
  rgb_l1_weight: 1.0
  dssim_weight: 0.1
  lpips_weight: 0.0
  depth_weight: 0.05
  context_weight: 0.0
  opacity_reg_weight: 0.001
  alpha_coverage_weight: 0.01
  scale_reg_weight: 0.002
  anisotropy_reg_weight: 0.001
  delta_reg_weight: 0.0
  mean_step_reg_weight: 0.0
  sh_reg_weight: 0.0005
  intermediate_weight: 0.5

Optimizer:
  lr: 2.0e-4
  weight_decay: 0.01

WeightsAndBiases:
  enabled: true
  mode: online
  project: 360Droid-splat
  run_name: pano_resplat_panovggt_aligned_init_128x256_render_512x1024
  tags: ["pano-resplat", "panovggt-aligned", "sh3", "init"]

Validation:
  enabled: true
  fraction: 0.05
  max_batches: 2

Checks:
  target_leakage_check: false
  renderer_gradient_check: true
  nan_check: true
