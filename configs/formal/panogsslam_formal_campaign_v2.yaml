version: 2
name: panogsslam_pager_globalmap_refinedanchor_50_200_v2
base_config: configs/formal/panogsslam_pager_globalmap_refinedanchor_50_200_v2.yaml
formal_root_parent: /mnt/disk1/lanboyang/Project/360Droid-splat/formal_results
weights_manifest: /mnt/disk1/lanboyang/Project/360Droid-splat/artifacts/checkpoints/panogsslam_formal_mainline_v1/manifest.json
torch_home: /mnt/disk1/lanboyang/Project/360Droid-splat/artifacts/checkpoints/panogsslam_formal_mainline_v1/evaluation/torch_hub
seed: 123
max_concurrent_workers: 2
resource_limits:
  min_available_memory_gib: 80
  min_free_disk_gib: 100
  max_prelaunch_cpu_load_fraction: 0.80
  monitor_interval_sec: 15
  consecutive_swap_growth_limit: 2
datasets:
  - name: ob3d
    type: ob3d
    root: /mnt/disk1/lanboyang/Datasets/PFGS360/OB3D/OB3D
    frames: 100
    scenes:
      - archiviz-flat
      - barbershop
      - bistro
      - classroom
      - emerald-square
      - fisher-hut
      - lone-monk
      - pavillion
      - restroom
      - san-miguel
      - sponza
      - sun-temple
    splits: [Egocentric, Non-Egocentric]
    config_overrides:
      VoxelAnchorRefiner:
        voxel_sizes: [0.02, 0.04, 0.08, 0.16]
        allow_voxel_size_override: true
      SphericalSelfiRuntime:
        sky:
          enabled: false
          required: false
      SphericalSelfiGlobalBackend:
        voxel_fusion:
          voxel_sizes: [0.02, 0.04, 0.08, 0.16]
        map_optimization:
          pfgs360:
            validity_gate: pfgs360_official_no_semantic_gate
            filter_sky: false
      Mapping:
        sky_mask_enable: false
        sky_mask_source: none
      SkyBox:
        enabled: false
        optimize: false
        optimization_mask_enable: false
        force_sky_render: false
  - name: 360vo
    type: ob3d
    root: /mnt/disk1/zwh/Dataset/360VO-PFGS360
    frames: 500
    scenes: [seq0, seq1, seq2, seq3, seq4, seq5, seq6, seq7, seq8, seq9]
    splits: [Egocentric]
    config_overrides:
      VoxelAnchorRefiner:
        voxel_sizes: [0.04, 0.08, 0.16, 0.32]
        allow_voxel_size_override: false
      SphericalSelfiRuntime:
        sky:
          enabled: true
          required: true
          threshold: 0.6
      SphericalSelfiGlobalBackend:
        global_graph:
          sky_threshold: 0.6
        voxel_fusion:
          voxel_sizes: [0.04, 0.08, 0.16, 0.32]
        map_optimization:
          pfgs360:
            validity_gate: pfgs360_official_sky_only
            filter_sky: true
      Mapping:
        sky_mask_enable: true
        sky_mask_source: panovggt_head
      SkyBox:
        enabled: true
