Training:
  steps: 20000
  batch_size: 2
  gradient_accumulation_steps: 2
  frames_per_sample: 4
  num_workers: 2
  amp: true
  seed: 1234
  output_dir: outputs/panovggt_geometry/finetune_omni360_256x512
  log_every: 10
  save_every: 1000
  val_every: 250
  vis_every: 250
  grad_clip: 1.0

Model:
  use_synthetic_model: false
  panovggt_repo: /mnt/disk1/lanboyang/Project/PanoVGGT
  panovggt_config: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  panovggt_checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  image_size: [256, 512]
  patch_multiple: 14
  amp: true
  input_batch_dim: true
  strict_checkpoint: false
  skip_dinov2_pretrain: true
  trainable_modules:
    - point_decoder
    - point_head
    - global_points_decoder
    - global_point_head
    - camera_decoder
    - camera_head
  strict_trainable_modules: true

Dataset:
  synthetic: false
  root: /mnt/disk1/lanboyang/Datasets/Airsim360/Omni360-Scene
  pose_root: /mnt/disk1/lanboyang/Datasets/Airsim360/UE_Raw_sample_pts
  scenes: ["DTW", "NYC"]
  erp_resize_height: 256
  erp_resize_width: 512
  clip_stride: 1
  temporal_radius: 4
  depth_format: euclidean_range
  depth_scale: 1.0
  depth_invalid_value: 1000.0
  pose_coordinate_system: ue_airsim
  pose_translation_scale: 0.01
  validation_fraction: 0.05
  validation_split: tail
  class_map:
    sky_names: ["Sky", "sky"]
    sky_ids: [3]

Loss:
  local_point_weight: 1.0
  global_point_weight: 0.5
  depth_weight: 0.2
  pose_rot_weight: 0.1
  pose_trans_weight: 0.1
  smooth_weight: 0.02

Optimizer:
  lr: 1.0e-4
  weight_decay: 0.01

Validation:
  enabled: true
  batch_size: 1
  num_workers: 1
  max_batches: 8

Visualization:
  enabled: true
  max_views: 4
  save_dir: visualizations

WeightsAndBiases:
  enabled: true
  mode: online
  project: 360Droid-splat
  run_name: panovggt_geometry_finetune_omni360_256x512
  tags: ["panovggt", "geometry-finetune", "omni360", "256x512"]
