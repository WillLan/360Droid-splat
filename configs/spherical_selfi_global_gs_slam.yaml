Runtime:
  mode: sync_mvp

Dataset:
  synthetic: false
  dataset_path: /mnt/disk1/lanboyang/Datasets/Airsim360/Omni360-Scene/DTW/dtw_Raw
  height: 504
  width: 1008

Frontend:
  mode: spherical_selfi_window

image:
  height: 504
  width: 1008
  head_height: 504
  head_width: 1008

panovggt:
  synthetic: false
  repo_path: /mnt/disk1/lanboyang/Project/PanoVGGT
  config_path: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  model_kwargs: {}
  freeze: true
  use_no_grad: true
  strict_checkpoint: false
  skip_dinov2_pretrain: true
  pose_convention: c2w
  depth_convention: euclidean_ray_depth
  stage_hooks:
    - aggregator.decoder.8
    - aggregator.decoder.16
    - aggregator.decoder.24
    - aggregator.decoder.34
  feature_keys: [null, null, null, null]
  token_hw: [[36, 72], [36, 72], [36, 72], [36, 72]]
  token_start_idx: [5, 5, 5, 5]
  in_channels: [1024, 1024, 1024, 1024]

adapter_checkpoint:
  path: /mnt/disk1/lanboyang/Project/360Droid-splat/outputs/stage1_selfi_adapter_airsim_dtw_nyc_fullres_spherical_ce_depth20_ddp2/checkpoints/best_val_angular_error.pt
  sha256: 95cdbb5404acba8654e868335ede6a00c281451d7ef7c104d3a10f63fc3730b9

stage2_checkpoint:
  path: /mnt/disk1/lanboyang/Project/360Droid-splat/outputs/stage2_selfi_joint_gpu03_20260712_20k_r1/stage2_selfi_omniscene_joint_fullres_s4_ddp2_effbs4_20k_gpu03_20260712_r1/checkpoints/best_val_psnr.pt

# Mainline Stage-3 path.  The frontend sends provisional whole-chunk anchors;
# learned refinement is deferred until the overlap bridge fixes local poses.
VoxelAnchorRefiner:
  enabled: true
  checkpoint: /mnt/disk1/lanboyang/Project/360Droid-splat/outputs/stage3_spherical_voxel_anchor_refiner_omni360_fullres_20k_resume_83cea9d_gpu05_20260715_1510/checkpoints/best_val_psnr.pt
  sha256: 63d4b02565f5278eafd278b3d305620df97b551c9b85c05361d25d0416077b97
  iterations: 3
  hidden_dim: 32
  adapter_dim: 24
  depth_boundaries: [5.0, 20.0, 40.0]
  voxel_sizes: [0.04, 0.08, 0.16, 0.32]
  alpha_threshold: 0.05
  depth_abs_threshold: 0.10
  depth_rel_threshold: 0.05
  tangent_scale_floor_ratio: 0.333333
  normal_scale_floor_ratio: 0.05

head:
  feature_dim: 24
  channels: [32, 64, 128, 256]
  mlp_hidden_dim: 64
  rgb_sh_degree: 2
  density_sh_degree: 1
  depth_residual_ratio: 0.25
  initial_opacity: 0.10
  min_depth: 1.0e-4
  min_scale: 1.0e-5
  max_scale_ratio: 0.25
  latitude_cos_min: 1.0e-3
  log_scale_clamp: 5.0
  render_prune_fraction: 0.30
  gradient_checkpointing: false

SphericalSelfiRuntime:
  enabled: true
  feature_device: cuda:0
  head_device: cuda:0
  feature_amp: true
  window:
    size: 4
    stride: 2
    expected_overlap_frames: 2
    enforce_exact_overlap: true
    verification_size: [32, 64]
    latitude_bands: 8
  sky:
    enabled: true
    required: true
    checkpoint: /mnt/disk1/lanboyang/Project/360Droid-splat/outputs/panovggt_m3_sphere_omni360_sky_ddp_b4_10k_dtw_nyc_20260604_0845/checkpoints/sky_head.pt
    threshold: 0.5
    strict: true
  fibonacci:
    mode: depth_filtered
    oversample_factor: 8
    seed: 123
    min_depth: 0.05
    max_depth: 20.0
  local_ba:
    enabled: true
    pose_safe_two_stage: false
    iterations: 8
    damping: 1.0e-4
    solver_mode: standard_lm
    lm_max_trials: 8
    lm_acceptance_eta: 1.0e-6
    lm_damping_min: 1.0e-8
    lm_damping_max: 1.0e8
    lm_diagonal_floor: 1.0e-6
    jacobian_mode: analytic
    validate_analytic_jacobian: false
    analytic_jacobian_atol: 1.0e-5
    analytic_jacobian_rtol: 1.0e-4
    pose_update_side: right
    pose_dof_mode: se3
    gauge_mode: initial_baseline
    dense_depth_mode: affine
    defer_dense_depth_affine: false
    dense_depth_output_floor: 0.01
    max_depth_shift_ratio: 0.25
    max_depth_shift_step_ratio: 0.05
    residual_worse_tolerance: 1.05
    huber_delta_deg: 0.5
    pose_prior_weight: 1.0e-3
    depth_prior_weight: 1.0e-2
    max_pose_update_deg: 30.0
    max_translation_update: 1.0
    max_logdepth_update: 0.70
    factor_chunk_size: 2048
    min_factors: 128
    min_affine_support: 64
    min_depth: 0.05
    max_depth: 20.0
    gradient_tolerance: 1.0e-8
    step_tolerance: 1.0e-8
    relative_objective_tolerance: 1.0e-6
    affine_min_relative_improvement: 1.0e-3
    outlier_refinement:
      enabled: false
      second_stage_iterations: 10
      angular_mad_scale: 3.0
      angular_min_deg: 1.0
      angular_max_deg: 5.0
      sim3_irls_iterations: 3
      sim3_mad_scale: 3.0
      sim3_min_residual: 0.01
      sim3_max_relative_depth: 0.05
      min_inliers: 128
      min_inlier_ratio: 0.20
      validation_stride: 5
      validation_min_inliers: 32
      validation_min_inlier_ratio: 0.10
      validation_residual_worse_tolerance: 1.0
      validation_sim3_worse_tolerance: 1.05
    matching:
      type: adapter
      num_queries: 1024
      min_depth: 0.05
      max_depth: 20.0
      temperature: 0.07
      query_chunk_size: 32
      fibonacci_oversample_factor: 8
      use_spherical_area_correction: true
      forward_backward: true
      fb_tolerance_deg: 1.0
      min_factor_weight: 0.01
      factor_weight_mode: descriptor_confidence

SphericalSelfiGlobalBackend:
  enabled: true
  rgb_sh_degree: 2
  rendered_overlap_alignment:
    enabled: true
    # Mainline: scale is estimated only from canonical previous BA depth and
    # current raw BA8 overlap depth.  Global-map rendering is diagnostic only.
    mode: two_frame_bridge_depth_scale
    min_points: 256
    max_points: 4096
    min_points_per_frame: 256
    max_points_per_frame: 2048
    alpha_threshold: 0.05
    min_confidence: 0.05
    min_inlier_ratio: 0.35
    max_median_relative_error: 0.10
    max_scale_change: 2.5
    irls_iterations: 5
    holdout_stride: 5
    covariance_min_ratio: 1.0e-4
    max_rotation_correction_deg: 10.0
    max_translation_correction: 1.0
    max_shared_rotation_error_deg: 5.0
    max_shared_center_error: 0.15
    global_map_consistency_max_relative_error: 0.15
    global_map_min_consistency_ratio: 0.35
    pose_baseline_min: 0.001
    post_refiner_scale_recheck: false
    post_refiner_scale_rerun_threshold: 0.02
    post_refiner_scale_max_relative_change: 0.10
    failure_policy: error
  insertion_dedup:
    enabled: true
    visible_only: true
    same_level_only: true
    # The four-view visible Hash uses the confirmed relaxed same-level radius.
    # The 1.0 / 1.25 / 1.5 short-run configs remain available for ablations.
    radius_voxels: 1.5
    compare_existing_only: true
    permanent_drop: true
    update_existing_statistics: true
    require_new_frame_support: true
    # Conditional fallback only: set to 100000 in an experiment override if
    # radius=1.5 still misses the per-chunk growth target.
    max_new_gaussians_per_chunk: 0
    coverage_coarse_cell_size: 0.64
    # Four additional global-map renders per chunk. Keep disabled for normal
    # runs; the radius20 sweep enables it to measure post-Hash coverage.
    log_posthash_coverage: false
  post_optimization_seam_check:
    enabled: true
  geometry_validation:
    enabled: true
    tolerance: 1.0e-5
    rollback_on_failure: true
  robust_loop:
    mode: dcs
    dcs_phi: 25.0
    transactional: true
    min_commit_dcs_scale: 0.05
    max_nonloop_objective_ratio: 1.02
    nonloop_objective_tolerance: 1.0e-6
    path_max_rotation_deg: 45.0
    path_max_translation: 5.0
    path_max_log_scale: 1.0986122887
  hierarchical_submaps:
    enabled: true
    windows_per_submap: 8
    shared_boundary_nodes: 1
    local_camera_model: se3_shared_scale
    compress_frozen_dense_factors: true
  global_graph:
    optimization_enabled: true
    node_mode: chunk_first_stride
    optimization_trigger: periodic_and_loop
    factor_mode: dense_spherical
    sampling: fibonacci_depth_filtered
    iterations: 8
    damping: 1.0e-4
    lm_max_trials: 6
    lm_acceptance_eta: 1.0e-4
    lm_damping_min: 1.0e-8
    lm_damping_max: 1.0e8
    lm_diagonal_floor: 1.0e-6
    pcg_iterations: 64
    pcg_tolerance: 1.0e-6
    dense_linearization_chunk_size: 512
    analytic_dense_linearization: true
    restrict_objective_to_active_factors: true
    normalize_dense_information_by_count: true
    dense_information_reference_count: 64
    recent_windows: 32
    optimization_start_nodes: 6
    optimization_interval_edges: 3
    active_nodes: 6
    allow_boundary_matching_fallback: false
    expected_overlap_frames: 2
    enforce_exact_overlap: true
    chunk_stride:
      target_index: 2
      holdout_stride: 5
      irls_iterations: 5
    skip_edge:
      enabled: false
      num_queries: 2048
      temperature: 0.07
      query_chunk_size: 32
      fibonacci_oversample_factor: 8
      use_spherical_area_correction: true
      forward_backward: true
      fb_tolerance_deg: 1.0
      min_factor_weight: 0.01
      subpixel_refine_radius: 1
    overlap_num_queries: 4096
    factor_queries_per_direction: 2048
    max_dense_factors_per_edge: 4096
    min_dense_factors: 32
    fibonacci_oversample_factor: 8
    fibonacci_seed: 123
    min_depth: 0.05
    max_depth: 20.0
    sky_threshold: 0.5
    min_match_cosine: 0.45
    max_match_entropy: 0.95
    min_factor_weight: 0.01
    forward_backward: true
    fb_tolerance_deg: 1.0
    target_area_correction: true
    source_area_reweight: false
    s2_huber_delta_deg: 1.0
    depth_factor_weight: 0.1
    min_overlap_points: 32
    max_overlap_points: 4096
    max_overlap_residual: 0.35
    min_overlap_inlier_ratio: 0.35
    umeyama_irls_iterations: 5
    umeyama_huber_delta: null
    max_scale_change: 2.5
    allow_unaligned_fallback: false
  loop_closure:
    # Explicit opt-in to the arbitrary-orientation loop path. Code defaults
    # remain on the legacy latitude-band descriptor for older configs.
    insert_pose_factor: true
    descriptor:
      mode: so3_sh_gram
      max_degree: 6
      num_samples: 2048
      store_fp16: true
    retrieval:
      top_k: 20
      candidate_nms_radius: 2
      max_verified_candidates: 3
      max_accepted_loops: 1
    verification:
      mode: spherical_so3
      rotation_inlier_threshold_deg: 2.0
      min_rotation_inlier_ratio: 0.35
      min_spherical_coverage_bins: 6
      coverage_latitude_bins: 3
      coverage_longitude_bins: 4
      max_rotation_consistency_deg: 3.0
      max_normalized_alignment_residual: 0.10
    top_k: 5  # Legacy fallback; ignored by retrieval.top_k above.
    exclude_recent_windows: 5
    min_retrieval_score: 0.35
    min_match_cosine: 0.45
    min_matches: 64
    max_matches: 512
    min_inlier_ratio: 0.30
    max_alignment_residual: 0.35
    max_scale_change: 2.5
    coincident_translation_threshold: 0.15
    coincident_rotation_residual_deg: 2.0
    rotation_ransac_iterations: 128
  keyframe_selection:
    enabled: true
    min_gap: 2
    max_gap: 6
    score_threshold: 0.45
    descriptor_weight: 0.35
    coverage_weight: 0.20
    parallax_weight: 0.30
    residual_weight: 0.15
    translation_depth_ratio: 0.05
    rotation_deg: 10.0
  voxel_fusion:
    voxel_sizes: [0.04, 0.08, 0.16, 0.32]
    min_confidence: 0.05
    min_opacity: 0.02
    # Retain the global long-sequence safety cap.  A no-cap run is allowed
    # only as an explicit short-sequence ablation override.
    max_total_gaussians: 3000000
    # This switch controls selection at the global 3M cap; it is independent
    # of insertion_dedup.max_new_gaussians_per_chunk.
    coverage_aware_budget: true
    coverage_coarse_cell_size: 0.64
    lifecycle_prune_interval_windows: 8
    max_stale_frames: 0
    max_render_error: null
  map_optimization:
    renderer: gsplat360
    steps_per_window: 20
    sample_observations_per_step: 1
    sampler: shuffled_cycle
    gaussian_lr: 0.002
    separate_gaussian_lrs: true
    xyz_lr: 5.0e-4
    feature_lr: 2.0e-3
    sh_rest_lr: 1.0e-4
    opacity_lr: 1.0e-3
    scaling_lr: 1.0e-4
    rotation_lr: 1.0e-4
    scale_gaussian_parameter_updates: true
    pose_refine_enable: true
    pose_lr: 2.0e-4
    pose_prior_weight: 1.0e-3
    lazy_submap_transforms:
      enabled: true
    pose_grad_clip: 0.001
    s2_loss_weight: 0.1
    match_depth_loss_weight: 0.01
    visible_neighbor_lr_scale: 0.1
    extra_steps_on_loop: 20
    loop_neighborhood_refinement: true
    loop_neighborhood_submap_radius: 1
    loop_seam_deduplication: true
    final_steps: 0
    seed: 123

MapRepresentation:
  mode: anchor_scaffold_panorama

BackendOptimization:
  enabled: true
  sh_degree: 2
  ReSplatGlobal:
    gaussian_scope: owner_window_visible
    pose_refine_enable: true
    random_observation_per_iter: true
    sample_observations_per_step: 1

Mapping:
  lr: 0.002
  max_seeds_per_keyframe: 0
  min_depth_confidence: 0.0
  sky_mask_enable: true
  sky_mask_source: panovggt_head

SkyBox:
  enabled: true
  type: cubemap
  resolution: 512
  init_from_first_keyframe: true
  optimize: true
  optimization_mask_enable: true
  force_sky_render: true
  init_fallback_to_full_image: false
  lr: 0.01

Training:
  panorama_render_mode: pfgs360_gsplat
  pfgs360_render_mode: RGB+ED
  pfgs360_rasterize_mode: antialiased
  pfgs360_packed: false
  pfgs360_radius_clip: 0.0
  pfgs360_near_plane: 0.01
  pfgs360_far_plane: 100000.0
  pfgs360_absgrad: true
  pfgs360_distloss: false

Renderer:
  allow_smoke_fallback: false
  extra_gsplat360_roots: []

WeightsAndBiases:
  enabled: true
  project: 360Droid-splat
  mode: online
  run_name: spherical_selfi_global_gs_slam
  tags: [spherical-selfi, stage2, sim3-graph, voxel-fusion, panorama]

Visualization:
  enabled: true
  save_local: true
  log_every: 5
  save_kf_opt: true
  kf_opt_log_every: 1
  post_opt_all_frames: true
  post_opt_log_depth: false

Results:
  save_dir: outputs/spherical_selfi_global_gs_slam
  kf_render_format: png
