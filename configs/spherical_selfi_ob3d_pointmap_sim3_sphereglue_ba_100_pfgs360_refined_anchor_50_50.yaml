base_config: spherical_selfi_ob3d_pointmap_sim3_sphereglue_ba_100_pfgs360_freeze.yaml

# Formal PointMap-Sim3 mainline: PFGS360 CAMERA/DIA/JOINT with Refiner anchors
# as the only growth source.  DIA owns quality deletion; the Refiner does not
# participate in old-map responsibility queries.
Runtime:
  cpu_threading:
    enabled: true
    intraop_threads: 8
    interop_threads: 2
    native_threads: 8
    opencv_threads: 2

SphericalSelfiGlobalBackend:
  insertion_dedup:
    enabled: true
    radius_voxels: 1.0
  insertion_depth_gate:
    enabled: false
  error_gaussian_prune:
    enabled: false
  map_optimization:
    strategy: pfgs360_full_50_50
    steps_per_window: 100
    camera_steps: 50
    joint_steps: 50
    sample_observations_per_step: 1
    optimize_all_gaussians: true
    fixed_first_frame: true
    pose_refine_enable: true
    pose_lr: 1.0e-3
    joint_pose_lr: 1.0e-3
    pose_grad_clip_value: 1.0e-2
    xyz_lr: 1.6e-4
    feature_lr: 2.5e-3
    sh_rest_lr: 1.25e-4
    opacity_lr: 5.0e-2
    scaling_lr: 5.0e-3
    rotation_lr: 1.0e-3
    adam_eps: 1.0e-15
    rgb_l1_weight: 0.8
    dssim_weight: 0.2
    latter_half_sample_probability: 0.7
    pfgs360:
      # Keep transaction snapshots and persistent Adam moments beside the map
      # instead of cloning the full state through host memory every window.
      state_storage_device: map
      growth_source: refined_anchor
      bootstrap_source: refined_anchor_all_views
      growth_frame_policy: chunk_new_frames
      validity_gate: pfgs360_official_sky_only
      topology_refine_enabled: false
      spherical_balance_sine: 0.8
      spherical_balance_floor: 0.2
      tangent_threshold: 0.008
      depth_relative_threshold: 0.05
      blur_threshold: 0.5
      min_depth: 0.1
      max_depth: 50.0
      gncc_radius: 2
      align_depth: true
      patch_filter: true
      filter_sky: true
      query_responsibility_threshold: 0.8
      min_reset_gaussians: 100
      min_delete_gaussians: 100
      scale_ratio_threshold: 10.0
      phys_ratio_weight: 0.1
      phys_ratio_every: 10
      distortion_weight: 0.01
      opacity_regularizer_weight: 0.01
      scale_regularizer_weight: 0.01

Training:
  pfgs360_absgrad: false
  pfgs360_distloss: true

BackendFeedback:
  enabled: false

WeightsAndBiases:
  group: ob3d-sponza-pointmap-sim3-sphereglue-pfgs360-refined-anchor-50-50
  run_name: ob3d100_pointmap_sim3_sphereglue_pfgs360_refined_anchor_50_50_r1
  tags:
    - spherical-selfi
    - ob3d
    - sponza
    - non-egocentric
    - sphereglue-ba
    - overlap-pointmap
    - full-sim3
    - pfgs360-dia
    - refined-anchor-growth
    - camera50
    - joint50
    - formal100

Results:
  save_dir: outputs/ob3d100_pointmap_sim3_sphereglue_pfgs360_refined_anchor_50_50_r1
  save_final_checkpoint: true
