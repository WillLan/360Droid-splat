Dataset:
  synthetic: false
  dataset_path: /mnt/disk1/zwh/Dataset/PanoCity/beijing
  block_glob: beijing_block*
  frames_per_block: 300
  sequence: null
  erp_resize_height: 518
  erp_resize_width: 1036
  begin: 0
  end: 300

Runtime:
  mode: legacy_online
  multiprocessing_start_method: spawn

LegacyOnlineBackend:
  backend_impl: legacy
  feedback_enable: true
  submit_all_frontend_outputs: true
  synchronous_windows: true
  window_wait_timeout_s: 1800
  push_every_iters: 10
  join_timeout_s: 600
  color_refinement_on_stop: false
  device: cuda
  face_w: 256
  face_zfar: 500.0
  cameras_extent: 6.0

Frontend:
  mode: panovggt_long
  checkpoint: null
  keyframe_threshold: 1.1
  force_keyframe_interval: 8

PanoVGGT:
  engine: external
  repo_path: /mnt/disk1/lanboyang/Project/PanoVGGT
  config_path: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  strict_checkpoint: false
  image_size: [518, 1036]
  patch_multiple: 14
  chunk_size: 4
  overlap: 2
  emit_delay: 1
  align_mode: sim3
  require_aligned_world_points: true
  emit_unaligned: false
  min_overlap_points: 4096
  max_align_rmse: 0.25
  min_inlier_ratio: 0.35
  max_scale_jump: 2.0
  force_accept_alignment: false
  loop_enable: false
  max_alignment_points: 4096
  max_alignment_cache_frames: 128
  amp: true
  input_batch_dim: true
  skip_dinov2_pretrain: true

MapRepresentation:
  mode: anchor_scaffold_panorama

model_params:
  sh_degree: 2
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: false
  data_device: cuda

pipeline_params:
  convert_SHs_python: false
  compute_cov3D_python: false

opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.00016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.01
  scaling_lr: 0.0008
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 450
  opacity_reset_interval: 3000
  densify_from_iter: 400
  densify_until_iter: 15000
  densify_grad_threshold: 0.006
  init_lr: 6

Training:
  monocular: true
  init_itr_num: 300
  mapping_itr_num: 200
  mapping_itr_nosingle: 200
  random_window_frame_per_iter: true
  replay_random_kfs: 0
  global_BA_itr_num: 0
  window_size: 8
  pose_window: 8
  freeze_pose: false
  gaussian_update_every: 200
  gaussian_update_offset: 100
  enable_periodic_global_ba: true
  periodic_global_ba_interval: 30
  periodic_global_ba_warmup_kfs: 30
  periodic_global_ba_iters: 800
  panorama_render_mode: pfgs360_gsplat
  pfgs360_render_mode: RGB+ED
  pfgs360_rasterize_mode: antialiased
  pfgs360_packed: false
  pfgs360_radius_clip: 0.0
  pfgs360_near_plane: 0.01
  pfgs360_far_plane: 100000.0
  pfgs360_absgrad: true
  pfgs360_distloss: false
  render_background_rgb: [0.12, 0.14, 0.18]
  enable_loop_closure: true
  enable_submap: false
  lr:
    cam_rot_delta: 0.0001
    cam_trans_delta: 0.0001

Hierarchical:
  distance_lis: [40.0, 80.0]
  voxel_size_lis: [0.12, 0.45, 1.8]
  max_active_anchors_per_frame: 30000

SkyBox:
  enabled: true
  radius: 220.0
  n_anchors_init: 2048
  active_budget: 1024

Mapping:
  seed_source: world_points_only
  max_seeds_per_keyframe: 0
  min_depth_confidence: 0.2
  sky_mask_enable: true
  sky_mask_top_ratio: 0.58
  sky_mask_min_blue: 0.35
  sky_mask_blue_margin: 0.05
  sky_mask_cloud_brightness: 0.72
  sky_mask_cloud_saturation: 0.22
  sky_mask_texture_threshold: 0.08
  depth_min: 0.05
  depth_max: 80.0

WeightsAndBiases:
  enabled: true
  project: 360Droid-splat
  entity: null
  mode: online
  run_name: panovggt_legacy_online_panocity_beijing
  log_every: 1
  log_keyframes: true
  tags: [panovggt_long, legacy_online, panocity, beijing]

Visualization:
  save_local: true
  log_every: 1

Results:
  save_dir: outputs/pano_vggt_legacy_online_panocity_beijing
  save_results: true
  eval_rendering: true
  global_BA: false
  kf_render_format: png
  save_final_ply: true
  render_final_all_frames: true
