Dataset:
  synthetic: false
  dataset_path: /mnt/disk1/zwh/Dataset/PanoCity/beijing
  block_glob: beijing_block*
  frames_per_block: 300
  sequence: null
  erp_resize_height: 512
  erp_resize_width: 1024
  begin: 0
  end: 300

Frontend:
  mode: panovggt_long
  checkpoint: null
  keyframe_threshold: 1.1
  force_keyframe_interval: 8

PanoVGGT:
  engine: external
  repo_path: /mnt/disk1/lanboyang/Project/PanoVGGT
  config_path: /mnt/disk1/lanboyang/Project/PanoVGGT/training/config/default.yaml
  checkpoint: /mnt/disk1/lanboyang/Project/PanoVGGT/checkpoints/model.pt
  class_path: panovggt.models.panovggt_model.PanoVGGTModel
  strict_checkpoint: false
  image_size: [512, 1024]
  patch_multiple: 14
  chunk_size: 4
  overlap: 2
  emit_delay: 1
  align_mode: sim3
  loop_enable: false
  max_alignment_points: 4096
  max_alignment_cache_frames: 128
  amp: true
  input_batch_dim: true
  skip_dinov2_pretrain: true

MapRepresentation:
  mode: anchor_scaffold_panorama

Training:
  panorama_render_mode: pfgs360_gsplat
  pfgs360_render_mode: RGB+ED
  pfgs360_rasterize_mode: antialiased
  pfgs360_packed: false
  pfgs360_radius_clip: 0.0
  pfgs360_near_plane: 0.01
  pfgs360_far_plane: 100000.0
  pfgs360_absgrad: true
  pfgs360_distloss: false

Hierarchical:
  voxel_size_lis: [0.12, 0.45, 1.8]

Mapping:
  max_seeds_per_keyframe: 0
  min_depth_confidence: 0.2
  sky_mask_enable: true
  sky_mask_top_ratio: 0.58
  sky_mask_min_blue: 0.35
  sky_mask_blue_margin: 0.05
  sky_mask_cloud_brightness: 0.72
  sky_mask_cloud_saturation: 0.22
  sky_mask_texture_threshold: 0.08
  lr: 0.002
  refine_steps_per_keyframe: 0

BackendOptimization:
  enabled: true
  gaussian_refine_enable: true
  pose_refine_enable: true
  local_submap_steps: 20
  local_window_keyframes: 2
  sliding_window_steps: 20
  window_keyframes: 8
  final_global_steps: 200
  final_global_max_keyframes: 0
  optimize_existing_gaussians: visible_recent
  existing_gaussian_lr_scale: 0.1
  global_gaussian_lr_scale: 1.0
  gaussian_lr: 0.002
  pose_lr: 0.001
  pose_prior_weight: 0.001
  fixed_window_frames: 1
  weight_decay: 0.0

Renderer:
  allow_smoke_fallback: false
  extra_gsplat360_roots: []

WeightsAndBiases:
  enabled: true
  project: 360Droid-splat
  entity: null
  mode: online
  run_name: panovggt_long_panocity_beijing
  log_every: 1
  log_keyframes: true
  tags: [panovggt_long, panocity, beijing]

Visualization:
  save_local: true
  log_every: 1

Results:
  save_dir: outputs/pano_vggt_long_panocity_beijing
